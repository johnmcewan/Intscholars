<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Inside Twine — An Interactive Guide</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap');

:root {
  --bg:       #f5f0e8;
  --paper:    #fdfaf4;
  --ink:      #1a1a2e;
  --ink-dim:  #6b6080;
  --accent:   #5c35a0;
  --accent2:  #e05c2a;
  --accent3:  #1a7a5e;
  --highlight:#fff0b3;
  --code-bg:  #1a1a2e;
  --code-fg:  #a0f0c0;
  --border:   #c8bfa8;
  --tag-bg:   #5c35a0;
  --tag-fg:   #ffffff;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Libre Baskerville', Georgia, serif;
  font-size: 17px;
  line-height: 1.8;
  min-height: 100vh;
}

/* Ruled-paper lines on background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: repeating-linear-gradient(
    transparent,
    transparent 27px,
    rgba(180,160,120,0.18) 28px
  );
  pointer-events: none;
  z-index: 0;
}

#app {
  position: relative;
  z-index: 1;
  max-width: 820px;
  margin: 0 auto;
  padding: 0 20px 60px;
}

/* ── Header ── */
#site-header {
  text-align: center;
  padding: 48px 0 24px;
  border-bottom: 2px solid var(--border);
  margin-bottom: 32px;
}

.logo {
  font-family: 'Space Mono', monospace;
  font-size: 0.75rem;
  color: var(--accent);
  letter-spacing: 0.25em;
  text-transform: uppercase;
  margin-bottom: 8px;
}

#site-header h1 {
  font-size: 2.4rem;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.2;
}

#site-header h1 em {
  color: var(--accent);
  font-style: normal;
}

.tagline {
  color: var(--ink-dim);
  font-style: italic;
  margin-top: 8px;
  font-size: 1rem;
}

/* ── Progress bar ── */
#progress-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 28px;
}

#progress-label {
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem;
  color: var(--ink-dim);
  white-space: nowrap;
  letter-spacing: 0.06em;
}

#progress-bar-outer {
  flex: 1;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}

#progress-bar-inner {
  height: 100%;
  background: linear-gradient(to right, var(--accent), var(--accent2));
  border-radius: 3px;
  transition: width 0.5s ease;
}

#progress-count {
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem;
  color: var(--ink-dim);
  white-space: nowrap;
}

/* ── Chapter tag ── */
.chapter-tag {
  display: inline-block;
  background: var(--tag-bg);
  color: var(--tag-fg);
  font-family: 'Space Mono', monospace;
  font-size: 0.68rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 2px;
  margin-bottom: 14px;
}

/* ── Passage card ── */
#passage-card {
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 40px 48px;
  box-shadow: 3px 3px 0 var(--border);
  animation: slide-in 0.35s ease;
  position: relative;
}

@keyframes slide-in {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

#passage-title {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 20px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}

/* ── Body text ── */
.prose p { margin-bottom: 1.1em; }
.prose p:last-child { margin-bottom: 0; }
.prose strong { color: var(--ink); }
.prose em { color: var(--ink-dim); }

/* ── Code blocks ── */
.code-block {
  background: var(--code-bg);
  color: var(--code-fg);
  font-family: 'Space Mono', monospace;
  font-size: 0.8rem;
  line-height: 1.6;
  padding: 16px 20px;
  border-radius: 4px;
  margin: 16px 0;
  overflow-x: auto;
  white-space: pre;
  border-left: 3px solid var(--accent);
}

.code-comment { color: #6a8a70; }
.code-keyword { color: #f0a040; }
.code-string  { color: #80d0f0; }
.code-value   { color: #e08080; }

/* ── Callout boxes ── */
.callout {
  border-left: 4px solid var(--accent);
  background: rgba(92,53,160,0.06);
  padding: 14px 18px;
  margin: 16px 0;
  border-radius: 0 4px 4px 0;
  font-size: 0.95rem;
}

.callout.tip  { border-color: var(--accent3); background: rgba(26,122,94,0.06); }
.callout.warn { border-color: var(--accent2); background: rgba(224,92,42,0.06); }

.callout-label {
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent);
  display: block;
  margin-bottom: 4px;
}

.callout.tip  .callout-label { color: var(--accent3); }
.callout.warn .callout-label { color: var(--accent2); }

/* ── Live demo area ── */
.demo-box {
  border: 2px dashed var(--border);
  border-radius: 4px;
  padding: 18px 22px;
  margin: 16px 0;
  background: rgba(245,240,232,0.6);
}

.demo-label {
  font-family: 'Space Mono', monospace;
  font-size: 0.68rem;
  letter-spacing: 0.12em;
  color: var(--ink-dim);
  text-transform: uppercase;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.demo-label::before {
  content: '▶';
  color: var(--accent2);
  font-size: 0.6rem;
}

/* ── Inline interactive elements (demo) ── */
.demo-link {
  color: var(--accent);
  text-decoration: underline;
  text-underline-offset: 3px;
  cursor: pointer;
  font-style: italic;
}

.demo-link:hover { color: var(--accent2); }

.demo-revealed {
  color: var(--accent3);
  font-style: italic;
  animation: pop-in 0.3s ease;
}

@keyframes pop-in {
  from { opacity: 0; transform: scale(0.9); }
  to   { opacity: 1; transform: scale(1); }
}

.demo-counter-val {
  font-family: 'Space Mono', monospace;
  font-weight: 700;
  color: var(--accent);
  font-size: 1.1em;
}

.demo-hp-bar-wrap {
  height: 14px;
  background: #ddd;
  border-radius: 7px;
  overflow: hidden;
  margin: 6px 0;
  width: 200px;
}

.demo-hp-bar {
  height: 100%;
  background: linear-gradient(to right, #e05c2a, #c03010);
  border-radius: 7px;
  transition: width 0.4s ease;
}

.demo-inventory {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 6px;
}

.demo-inv-item {
  background: var(--accent);
  color: white;
  font-family: 'Space Mono', monospace;
  font-size: 0.72rem;
  padding: 2px 9px;
  border-radius: 2px;
}

.demo-btn {
  background: var(--accent);
  color: white;
  font-family: 'Space Mono', monospace;
  font-size: 0.75rem;
  border: none;
  padding: 6px 14px;
  border-radius: 3px;
  cursor: pointer;
  margin: 4px 4px 4px 0;
  transition: background 0.2s;
}

.demo-btn:hover { background: var(--accent2); }
.demo-btn:disabled { background: #aaa; cursor: not-allowed; }

/* ── Feature grid ── */
.feature-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin: 16px 0;
}

.feature-card {
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 14px 16px;
  background: var(--paper);
  cursor: pointer;
  transition: all 0.2s;
}

.feature-card:hover {
  border-color: var(--accent);
  box-shadow: 2px 2px 0 var(--accent);
  transform: translate(-1px,-1px);
}

.fc-icon { font-size: 1.4rem; margin-bottom: 4px; }
.fc-title {
  font-family: 'Space Mono', monospace;
  font-size: 0.8rem;
  color: var(--accent);
  font-weight: 700;
  margin-bottom: 4px;
}
.fc-desc { font-size: 0.85rem; color: var(--ink-dim); line-height: 1.5; }

/* ── Choices ── */
#choices-area {
  margin-top: 28px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.choice-btn {
  background: transparent;
  border: 1.5px solid var(--accent);
  color: var(--accent);
  font-family: 'Libre Baskerville', Georgia, serif;
  font-size: 0.97rem;
  padding: 13px 20px 13px 40px;
  text-align: left;
  cursor: pointer;
  border-radius: 3px;
  transition: all 0.2s;
  position: relative;
  line-height: 1.4;
}

.choice-btn::before {
  content: '→';
  position: absolute;
  left: 16px;
  font-family: 'Space Mono', monospace;
  transition: left 0.2s;
}

.choice-btn:hover {
  background: var(--accent);
  color: white;
}

.choice-btn:hover::before { left: 20px; }

/* ── Breadcrumb / visited ── */
#breadcrumb {
  font-family: 'Space Mono', monospace;
  font-size: 0.68rem;
  color: var(--ink-dim);
  margin-bottom: 16px;
  letter-spacing: 0.04em;
}

#breadcrumb span { color: var(--accent2); }

/* ── Footer ── */
#site-footer {
  text-align: center;
  font-family: 'Space Mono', monospace;
  font-size: 0.68rem;
  color: var(--ink-dim);
  margin-top: 40px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
  letter-spacing: 0.06em;
}
</style>
</head>
<body>
<div id="app">

  <header id="site-header">
    <div class="logo">An Interactive Guide</div>
    <h1>Inside <em>Twine</em></h1>
    <p class="tagline">Explore what Twine can do — by doing it.</p>
  </header>

  <div id="progress-wrap">
    <span id="progress-label">PROGRESS</span>
    <div id="progress-bar-outer"><div id="progress-bar-inner" style="width:0%"></div></div>
    <span id="progress-count">0 / 0</span>
  </div>

  <div id="breadcrumb"></div>

  <div id="passage-card">
    <div class="chapter-tag" id="chapter-tag">Chapter 1</div>
    <div id="passage-title">Loading…</div>
    <div id="passage-body" class="prose"></div>
  </div>

  <div id="choices-area"></div>

  <footer id="site-footer">Built by Claude · A Twine Capability Demo · Harlowe Style</footer>
</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
const gs = {
  visited: new Set(),
  demoHP: 20,
  demoCounter: 0,
  demoInventory: [],
  demoRevealed: false,
  chosenFeature: null,
};

// ── Passage Map ──────────────────────────────────────────────────────────────
const passages = {

  // ── 1. Welcome ──
  "welcome": {
    chapter: "Introduction",
    title: "Welcome to Twine",
    total: 12,
    body: () => `
      <p><strong>Twine</strong> is a free, open-source tool for creating interactive, nonlinear stories — and much more. You write in a visual editor, connecting passages together like a web, and Twine outputs a single HTML file anyone can open in a browser.</p>
      <p>This guide will walk you through Twine's core capabilities. But rather than just <em>telling</em> you what Twine can do, we're going to <em>show</em> you — by using those same features right here, in this very document.</p>
      <div class="callout tip">
        <span class="callout-label">💡 Meta-Note</span>
        This entire guide is itself a Twine-style project: branching passages, variables, interactive demos, and multiple paths. You're already experiencing Twine as you read.
      </div>
      <p>Choose how you'd like to begin:</p>
    `,
    choices: [
      { text: "Start from the beginning — take me through everything.", target: "what_is_twine" },
      { text: "I know the basics. Show me the advanced features.", target: "feature_menu" },
    ]
  },

  // ── 2. What is Twine ──
  "what_is_twine": {
    chapter: "Chapter 1 · The Basics",
    title: "What Is Twine, Really?",
    body: () => `
      <p>At its heart, Twine is a <strong>passage editor</strong>. Your story is broken into discrete chunks called <em>passages</em> — think of them as index cards pinned to a corkboard. Each passage contains text, and you connect them by creating links.</p>
      <p>In Harlowe (Twine's default format), a link looks like this:</p>
      <div class="code-block"><span class="code-comment">// A basic link to another passage:</span>
[[Go into the forest]]

<span class="code-comment">// A link with custom label:</span>
[[Enter carefully->Go into the forest]]

<span class="code-comment">// A link that changes a variable AND goes somewhere:</span>
(set: $brave to true)[[Charge in recklessly->Go into the forest]]</div>
      <p>The Twine editor gives you a visual map of all your passages and their connections — you can literally <em>see</em> your story's shape as a network of nodes.</p>
      <div class="callout">
        <span class="callout-label">📌 Key Concept</span>
        A Twine project is just an HTML file. No server, no install needed to play. Share it by emailing the file or hosting it anywhere online.
      </div>
    `,
    choices: [
      { text: "Tell me about Harlowe — Twine's default format.", target: "harlowe_intro" },
      { text: "Skip ahead to variables and game logic.", target: "variables" },
    ]
  },

  // ── 3. Harlowe ──
  "harlowe_intro": {
    chapter: "Chapter 1 · The Basics",
    title: "Harlowe: Twine's Default Voice",
    body: () => `
      <p>Harlowe is the story format this guide uses. It's designed to be <strong>readable</strong> — its syntax reads almost like English, making it accessible to writers with no coding background.</p>
      <p>Here's what Harlowe syntax looks like in practice:</p>
      <div class="code-block"><span class="code-comment">// Setting a variable</span>
<span class="code-keyword">(set:</span> $playerName <span class="code-keyword">to</span> <span class="code-string">"Aria"</span><span class="code-keyword">)</span>

<span class="code-comment">// Displaying a variable inline</span>
Hello, (print: $playerName)!

<span class="code-comment">// Conditional text</span>
<span class="code-keyword">(if:</span> $brave <span class="code-keyword">is</span> true<span class="code-keyword">)</span>[You charge forward boldly.]
<span class="code-keyword">(else:)</span>[You hesitate at the threshold.]

<span class="code-comment">// A click-to-reveal span</span>
<span class="code-keyword">(click:</span> <span class="code-string">"the old chest"</span><span class="code-keyword">)</span>[It's empty. Of course it is.]</div>
      <p>Notice how <code style="background:#eee;padding:1px 5px;border-radius:3px;font-family:monospace;font-size:0.85em">(if:)</code>, <code style="background:#eee;padding:1px 5px;border-radius:3px;font-family:monospace;font-size:0.85em">(set:)</code>, and <code style="background:#eee;padding:1px 5px;border-radius:3px;font-family:monospace;font-size:0.85em">(click:)</code> all follow the same parenthetical pattern — that's Harlowe's macro syntax. Once you learn the pattern, everything else follows naturally.</p>
    `,
    choices: [
      { text: "Show me variables and tracking player choices.", target: "variables" },
      { text: "What about styling and visuals?", target: "styling" },
    ]
  },

  // ── 4. Variables ──
  "variables": {
    chapter: "Chapter 2 · Logic & Variables",
    title: "Variables: Remembering What Happened",
    body: () => `
      <p>Variables are how Twine <em>remembers</em>. Without them, every passage is a blank slate. With them, your story can track health, inventory, relationship scores, story flags, and more — and respond accordingly.</p>
      <div class="code-block"><span class="code-comment">// Types of variables in Harlowe</span>
<span class="code-keyword">(set:</span> $hp <span class="code-keyword">to</span> <span class="code-value">20</span><span class="code-keyword">)</span>           <span class="code-comment">// number</span>
<span class="code-keyword">(set:</span> $name <span class="code-keyword">to</span> <span class="code-string">"Aria"</span><span class="code-keyword">)</span>      <span class="code-comment">// string</span>
<span class="code-keyword">(set:</span> $hasSword <span class="code-keyword">to</span> true<span class="code-keyword">)</span>    <span class="code-comment">// boolean</span>
<span class="code-keyword">(set:</span> $items <span class="code-keyword">to</span> (a: <span class="code-string">"key"</span>, <span class="code-string">"map"</span>)<span class="code-keyword">)</span> <span class="code-comment">// array</span>

<span class="code-comment">// Modify them later</span>
<span class="code-keyword">(set:</span> $hp <span class="code-keyword">to</span> $hp - <span class="code-value">5</span><span class="code-keyword">)</span>
<span class="code-keyword">(set:</span> $items <span class="code-keyword">to</span> $items + (a: <span class="code-string">"torch"</span>)<span class="code-keyword">)</span></div>

      <div class="demo-box">
        <div class="demo-label">Live Demo — Variable Tracking</div>
        <p style="margin-bottom:10px">This counter is a variable. Watch it update:</p>
        <p>Clicks: <span class="demo-counter-val" id="demo-counter">${gs.demoCounter}</span></p>
        <button class="demo-btn" onclick="demoIncrement()">+ Click me</button>
        <button class="demo-btn" onclick="demoReset()">Reset</button>
        <p style="margin-top:10px;font-size:0.9em;color:var(--ink-dim)" id="demo-counter-msg">${gs.demoCounter >= 5 ? '🎉 You clicked 5+ times! In Twine, this could unlock a secret passage.' : 'Click 5 times to see something happen.'}</p>
      </div>
    `,
    choices: [
      { text: "Show me conditionals — if/else logic.", target: "conditionals" },
      { text: "How do I build an inventory system?", target: "inventory" },
    ]
  },

  // ── 5. Conditionals ──
  "conditionals": {
    chapter: "Chapter 2 · Logic & Variables",
    title: "Conditionals: Branching on State",
    body: () => `
      <p>The real power of Twine comes when passages <em>react</em> to what the player has done. Harlowe's <code style="background:#eee;padding:1px 4px;border-radius:3px;font-family:monospace;font-size:0.85em">(if:)</code> macro makes this easy.</p>
      <div class="code-block"><span class="code-comment">// Show different text based on a variable</span>
<span class="code-keyword">(if:</span> $hasSword<span class="code-keyword">)</span>[
  You draw your sword and step forward confidently.
]<span class="code-keyword">(else:)</span>[
  You wish you had a weapon right now.
]

<span class="code-comment">// Multiple conditions</span>
<span class="code-keyword">(if:</span> $hp > <span class="code-value">15</span><span class="code-keyword">)</span>[You feel strong.]
<span class="code-keyword">(else-if:</span> $hp > <span class="code-value">5</span><span class="code-keyword">)</span>[You're hurt but standing.]
<span class="code-keyword">(else:)</span>[You're barely alive.]

<span class="code-comment">// Conditional links — only appear when true</span>
<span class="code-keyword">(if:</span> $hasKey<span class="code-keyword">)</span>[[[Unlock the door->Secret Room]]]</div>

      <div class="demo-box">
        <div class="demo-label">Live Demo — Conditional Text</div>
        <p style="margin-bottom:8px">Your HP: <strong id="cond-hp-val">${gs.demoHP}</strong>/20</p>
        <div class="demo-hp-bar-wrap"><div class="demo-hp-bar" id="cond-hp-bar" style="width:${gs.demoHP/20*100}%"></div></div>
        <p style="margin: 10px 0; font-style:italic; color: var(--accent3)" id="cond-status-text">${getHPText()}</p>
        <button class="demo-btn" onclick="demoHurt()">Take 5 damage</button>
        <button class="demo-btn" onclick="demoHeal()">Heal 5 HP</button>
      </div>
    `,
    choices: [
      { text: "Tell me about inventory systems.", target: "inventory" },
      { text: "What about styling and layout?", target: "styling" },
    ]
  },

  // ── 6. Inventory ──
  "inventory": {
    chapter: "Chapter 2 · Logic & Variables",
    title: "Inventory Systems",
    body: () => `
      <p>Twine's array variables (<em>arrays</em> in Harlowe are called <strong>datamaps</strong> and <strong>arrays/sequences</strong>) let you build fully functional inventory systems. Items can be added, removed, and checked — just like a real game.</p>
      <div class="code-block"><span class="code-comment">// Initialize empty inventory</span>
<span class="code-keyword">(set:</span> $inv <span class="code-keyword">to</span> (a:)<span class="code-keyword">)</span>

<span class="code-comment">// Add an item</span>
<span class="code-keyword">(set:</span> $inv <span class="code-keyword">to</span> $inv + (a: <span class="code-string">"torch"</span>)<span class="code-keyword">)</span>

<span class="code-comment">// Check if player has item</span>
<span class="code-keyword">(if:</span> <span class="code-string">"torch"</span> is in $inv<span class="code-keyword">)</span>[You light the way ahead.]

<span class="code-comment">// Remove an item</span>
<span class="code-keyword">(set:</span> $inv <span class="code-keyword">to</span> $inv's <span class="code-keyword">(where:</span> it is not <span class="code-string">"torch"</span><span class="code-keyword">)</span><span class="code-keyword">)</span>

<span class="code-comment">// Display all items</span>
<span class="code-keyword">(for:</span> each _item, ...$inv<span class="code-keyword">)</span>[ • (print: _item) ]</div>

      <div class="demo-box">
        <div class="demo-label">Live Demo — Inventory</div>
        <p style="margin-bottom:8px">Pick up items and watch the inventory update:</p>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">
          <button class="demo-btn" id="btn-torch" onclick="demoPickup('🔦 Torch','btn-torch')">Pick up Torch</button>
          <button class="demo-btn" id="btn-key" onclick="demoPickup('🗝 Key','btn-key')">Pick up Key</button>
          <button class="demo-btn" id="btn-potion" onclick="demoPickup('🧪 Potion','btn-potion')">Pick up Potion</button>
          <button class="demo-btn" id="btn-map" onclick="demoPickup('🗺 Map','btn-map')">Pick up Map</button>
        </div>
        <p style="font-family:'Space Mono',monospace;font-size:0.72rem;color:var(--ink-dim);margin-bottom:6px">INVENTORY:</p>
        <div class="demo-inventory" id="demo-inv-display">
          ${gs.demoInventory.length ? gs.demoInventory.map(i=>`<span class="demo-inv-item">${i}</span>`).join('') : '<em style="color:var(--ink-dim);font-size:0.9rem">Empty</em>'}
        </div>
      </div>
    `,
    choices: [

// ── Total passages ────────────────────────────────────────────────────────────
const TOTAL = Object.keys(passages).length;

// ── Navigation ────────────────────────────────────────────────────────────────
function goTo(id) {
  const p = passages[id];
  if (!p) return;
  gs.visited.add(id);

  // Chapter tag
  document.getElementById('chapter-tag').textContent = p.chapter || '';

  // Title
  document.getElementById('passage-title').textContent = p.title;

  // Body — re-render so demo state is fresh
  document.getElementById('passage-body').innerHTML = p.body();

  // Choices
  const ca = document.getElementById('choices-area');
  ca.innerHTML = '';
  (p.choices || []).forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c.text;
    btn.addEventListener('click', () => goTo(c.target));
    ca.appendChild(btn);
  });

  // Progress
  const pct = Math.round((gs.visited.size / TOTAL) * 100);
  document.getElementById('progress-bar-inner').style.width = pct + '%';
  document.getElementById('progress-count').textContent = gs.visited.size + ' / ' + TOTAL;

  // Breadcrumb
  const bc = document.getElementById('breadcrumb');
  bc.innerHTML = 'You have visited <span>' + gs.visited.size + '</span> of ' + TOTAL + ' passages.';

  // Scroll
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Demo functions ────────────────────────────────────────────────────────────
function demoIncrement() {
  gs.demoCounter++;
  const el = document.getElementById('demo-counter');
  const msg = document.getElementById('demo-counter-msg');
  if (el) el.textContent = gs.demoCounter;
  if (msg) msg.textContent = gs.demoCounter >= 5
    ? '🎉 You clicked 5+ times! In Twine, this could unlock a secret passage.'
    : 'Click 5 times to see something happen.';
}

function demoReset() {
  gs.demoCounter = 0;
  const el = document.getElementById('demo-counter');
  const msg = document.getElementById('demo-counter-msg');
  if (el) el.textContent = 0;
  if (msg) msg.textContent = 'Click 5 times to see something happen.';
}

function getHPText() {
  if (gs.demoHP > 15) return '✅ You feel strong and ready for anything.';
  if (gs.demoHP > 8)  return '⚠️ You\'re hurt. Better find a healing potion.';
  if (gs.demoHP > 0)  return '🩸 You\'re barely standing. One more hit and it\'s over.';
  return '💀 You have fallen.';
}

function demoHurt() {
  gs.demoHP = Math.max(0, gs.demoHP - 5);
  const bar = document.getElementById('cond-hp-bar');
  const val = document.getElementById('cond-hp-val');
  const txt = document.getElementById('cond-status-text');
  if (bar) bar.style.width = (gs.demoHP / 20 * 100) + '%';
  if (val) val.textContent = gs.demoHP;
  if (txt) txt.textContent = getHPText();
}

function demoHeal() {
  gs.demoHP = Math.min(20, gs.demoHP + 5);
  const bar = document.getElementById('cond-hp-bar');
  const val = document.getElementById('cond-hp-val');
  const txt = document.getElementById('cond-status-text');
  if (bar) bar.style.width = (gs.demoHP / 20 * 100) + '%';
  if (val) val.textContent = gs.demoHP;
  if (txt) txt.textContent = getHPText();
}

function demoPickup(item, btnId) {
  if (!gs.demoInventory.includes(item)) {
    gs.demoInventory.push(item);
    const disp = document.getElementById('demo-inv-display');
    if (disp) disp.innerHTML = gs.demoInventory.map(i => `<span class="demo-inv-item">${i}</span>`).join('');
    const btn = document.getElementById(btnId);
    if (btn) { btn.textContent = '✓ Picked up'; btn.disabled = true; }
  }
}

function demoReveal() {
  gs.demoRevealed = true;
  // Re-render just the body of the current passage
  const p = passages["interactive_text"];
  if (p) document.getElementById('passage-body').innerHTML = p.body();
}

// ── Boot ──────────────────────────────────────────────────────────────────────
goTo("welcome");
</script>
